name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: archify/package-lock.json
      - name: Install renderer dependencies
        run: npm ci
        working-directory: archify
      - name: Golden-file + schema tests
        run: npm test
        working-directory: archify

  zip-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild archify.zip and compare contents
        run: |
          scripts/build-zip.sh /tmp/fresh.zip
          mkdir /tmp/fresh /tmp/checked
          unzip -q /tmp/fresh.zip -d /tmp/fresh
          unzip -q archify.zip -d /tmp/checked
          if ! diff -r /tmp/fresh/archify /tmp/checked/archify; then
            echo '::error::archify.zip is stale — run scripts/build-zip.sh and commit the result'
            exit 1
          fi

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install and validate packaged skill
        run: |
          set -euo pipefail
          rm -rf /tmp/archify-package
          mkdir -p /tmp/archify-package
          unzip -q archify.zip -d /tmp/archify-package
          cd /tmp/archify-package/archify
          npm ci --no-audit --no-fund

          node bin/archify.mjs --help
          node bin/archify.mjs render workflow examples/agent-tool-call.workflow.json /tmp/workflow.html
          node bin/archify.mjs check /tmp/workflow.html

          node bin/archify.mjs validate architecture examples/web-app.architecture.json --json
          node bin/archify.mjs validate workflow examples/agent-tool-call.workflow.json --json
          node bin/archify.mjs validate sequence examples/cache-miss-request.sequence.json --json
          node bin/archify.mjs validate dataflow examples/product-analytics.dataflow.json --json
          node bin/archify.mjs validate lifecycle examples/agent-run.lifecycle.json --json
